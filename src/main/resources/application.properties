server.port=${port:8081}
spring.data.mongodb.uri=mongodb://${db:carts-db}:27017/data
spring.application.name=carts

# Actuator - expose health and prometheus endpoints
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.enabled=true

# Zipkin tracing (optional, disabled by default)
management.zipkin.tracing.endpoint=http://${zipkin_host:zipkin}:9411/api/v2/spans
management.tracing.enabled=${zipkin_enabled:false}
management.tracing.sampling.probability=1.0